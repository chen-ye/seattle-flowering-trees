<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seattle Flowering Trees</title>
  <link href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css" rel="stylesheet">
  <script src="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: #f8f0f3;
    }

    #map {
      width: 100vw;
      height: 100vh;
    }

    /* ── Controls panel ─────────────────────────────────────────────── */
    #panel {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      background: rgba(255, 255, 255, 0.96);
      border-radius: 12px;
      padding: 14px 20px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.14);
      display: flex;
      align-items: center;
      gap: 14px;
      white-space: nowrap;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    #panel h1 {
      font-size: 15px;
      font-weight: 700;
      color: #2d1a2e;
      letter-spacing: -0.2px;
    }

    .divider {
      width: 1px;
      height: 20px;
      background: #ddd;
    }

    .filter-group {
      display: flex;
      gap: 6px;
    }

    .filter-btn {
      padding: 6px 14px;
      border: 1.5px solid #e8b4c8;
      border-radius: 20px;
      background: white;
      cursor: pointer;
      font-size: 13px;
      color: #7a3a55;
      font-weight: 500;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      line-height: 1;
    }

    .filter-btn:hover {
      background: #fff0f5;
    }

    .filter-btn.active {
      background: #e8436a;
      border-color: #e8436a;
      color: white;
    }

    /* ── Status bar ──────────────────────────────────────────────────── */
    #status {
      position: absolute;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      background: rgba(255,255,255,0.93);
      padding: 7px 18px;
      border-radius: 20px;
      font-size: 13px;
      color: #555;
      box-shadow: 0 1px 8px rgba(0,0,0,0.12);
      pointer-events: none;
      transition: opacity 0.8s ease;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    #status.hidden { opacity: 0; }

    /* ── Legend ──────────────────────────────────────────────────────── */
    #legend {
      position: absolute;
      bottom: 36px;
      right: 12px;
      z-index: 10;
      background: rgba(255,255,255,0.93);
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 12px;
      color: #555;
      box-shadow: 0 1px 8px rgba(0,0,0,0.12);
      line-height: 1.8;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    #legend .legend-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .legend-cluster {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      color: white;
      font-weight: bold;
      flex-shrink: 0;
    }

    /* ── Popup overrides ─────────────────────────────────────────────── */
    .maplibregl-popup-content {
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 13px;
      line-height: 1.6;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
      min-width: 160px;
    }

    .popup-name {
      font-weight: 700;
      color: #2d1a2e;
      margin-bottom: 2px;
    }

    .popup-sci {
      font-style: italic;
      color: #666;
      font-size: 12px;
    }

    .popup-cond {
      margin-top: 4px;
      font-size: 12px;
      color: #888;
    }

    .maplibregl-popup-close-button {
      font-size: 16px;
      color: #999;
      padding: 4px 8px;
    }
  </style>
</head>
<body>

<div id="map"></div>

<div id="panel">
  <h1>🌸 Seattle Flowering Trees</h1>
  <div class="divider"></div>
  <div class="filter-group" role="group" aria-label="Tree filter">
    <button class="filter-btn active" data-filter="cherry">Flowering Cherry</button>
    <button class="filter-btn"        data-filter="all"   >All Prunus</button>
  </div>
</div>

<div id="status">Loading tree data…</div>

<div id="legend">
  <div class="legend-row">
    <div class="legend-dot" style="background:#e8436a;border:1.5px solid white;box-shadow:0 0 0 1px #e8436a"></div>
    <span>Individual tree</span>
  </div>
  <div class="legend-row">
    <div class="legend-cluster" style="background:#d63579;width:16px;height:16px;font-size:8px">50</div>
    <span>Cluster (50–200)</span>
  </div>
  <div class="legend-row">
    <div class="legend-cluster" style="background:#a0195a;width:20px;height:20px">200</div>
    <span>Cluster (200+)</span>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// Configuration
// ─────────────────────────────────────────────────────────────────────────────

// SDOT trees ArcGIS REST endpoint
const SDOT_ENDPOINT =
  'https://gisdata.seattle.gov/server/rest/services/SDOT/SDOT_Assets/MapServer/6/query';

// Cherry blossom color palette
const COLORS = {
  single:  '#e8436a',
  small:   '#f28cb1',  // < 50 trees in cluster
  medium:  '#d63579',  // 50–200
  large:   '#a0195a',  // 200+
};

const PAGE_SIZE = 2000;

// ─────────────────────────────────────────────────────────────────────────────
// Map initialization
// ─────────────────────────────────────────────────────────────────────────────

const map = new maplibregl.Map({
  container: 'map',
  // CARTO Positron – free vector tiles, no API key needed
  style: 'https://basemaps.cartocdn.com/gl/positron-gl-style/style.json',
  center: [-122.335, 47.608],
  zoom: 11,
  minZoom: 9,
  maxZoom: 19,
});

map.addControl(new maplibregl.NavigationControl(), 'top-right');
map.addControl(new maplibregl.ScaleControl({ unit: 'imperial' }), 'bottom-left');

// ─────────────────────────────────────────────────────────────────────────────
// Data fetching
// ─────────────────────────────────────────────────────────────────────────────

async function fetchCount(where) {
  const url = `${SDOT_ENDPOINT}?${new URLSearchParams({
    where,
    returnCountOnly: 'true',
    f: 'json',
  })}`;
  const res = await fetch(url);
  const data = await res.json();
  return data.count ?? 0;
}

async function fetchPage(where, offset) {
  const url = `${SDOT_ENDPOINT}?${new URLSearchParams({
    where,
    outFields: 'SCIENTIFIC_NAME,COMMON_NAME,CONDITION',
    outSR: '4326',
    f: 'geojson',
    resultOffset: offset,
    resultRecordCount: PAGE_SIZE,
    returnGeometry: 'true',
  })}`;
  const res = await fetch(url);
  const data = await res.json();
  return data.features ?? [];
}

async function fetchAllTrees(where) {
  const count = await fetchCount(where);
  if (count === 0) return { type: 'FeatureCollection', features: [] };

  const offsets = [];
  for (let i = 0; i < count; i += PAGE_SIZE) offsets.push(i);

  // Fetch all pages in parallel for maximum speed
  const pages = await Promise.all(offsets.map(offset => fetchPage(where, offset)));
  return {
    type: 'FeatureCollection',
    features: pages.flat(),
  };
}

// ─────────────────────────────────────────────────────────────────────────────
// Layer management
// ─────────────────────────────────────────────────────────────────────────────

// Each dataset has a source id and a set of layer ids
const DATASETS = {
  cherry: {
    sourceId: 'cherry-trees',
    where: "UPPER(SCIENTIFIC_NAME) LIKE 'PRUNUS%' AND UPPER(COMMON_NAME) LIKE '%CHERRY%' AND CURRENT_STATUS = 'INSVC'",
  },
  all: {
    sourceId: 'all-trees',
    where: "UPPER(SCIENTIFIC_NAME) LIKE 'PRUNUS%' AND CURRENT_STATUS = 'INSVC'",
  },
};

function layerIds(key) {
  return [`${key}-clusters`, `${key}-cluster-count`, `${key}-points`];
}

function addDataset(key, geojson) {
  const { sourceId } = DATASETS[key];

  map.addSource(sourceId, {
    type: 'geojson',
    data: geojson,
    cluster: true,
    clusterMaxZoom: 14,   // stop clustering past zoom 14
    clusterRadius: 45,    // pixels
  });

  const visible = key === 'cherry' ? 'visible' : 'none';

  // ── Cluster circles ───────────────────────────────────────────────
  map.addLayer({
    id: `${key}-clusters`,
    type: 'circle',
    source: sourceId,
    filter: ['has', 'point_count'],
    layout: { visibility: visible },
    paint: {
      'circle-color': [
        'step', ['get', 'point_count'],
        COLORS.small,   50,
        COLORS.medium, 200,
        COLORS.large,
      ],
      'circle-radius': [
        'step', ['get', 'point_count'],
        14,  50,
        20, 200,
        28,
      ],
      'circle-opacity': 0.88,
      'circle-stroke-width': 1.5,
      'circle-stroke-color': 'rgba(255,255,255,0.7)',
    },
  });

  // ── Cluster count labels ──────────────────────────────────────────
  map.addLayer({
    id: `${key}-cluster-count`,
    type: 'symbol',
    source: sourceId,
    filter: ['has', 'point_count'],
    layout: {
      visibility: visible,
      'text-field': '{point_count_abbreviated}',
      'text-font': ['Open Sans Bold', 'Arial Unicode MS Bold'],
      'text-size': 11,
      'text-allow-overlap': true,
    },
    paint: {
      'text-color': '#fff',
    },
  });

  // ── Individual tree points ────────────────────────────────────────
  map.addLayer({
    id: `${key}-points`,
    type: 'circle',
    source: sourceId,
    filter: ['!', ['has', 'point_count']],
    layout: { visibility: visible },
    paint: {
      'circle-color': COLORS.single,
      'circle-radius': [
        'interpolate', ['linear'], ['zoom'],
        12, 3.5,
        16, 6,
        19, 9,
      ],
      'circle-opacity': 0.85,
      'circle-stroke-width': 1,
      'circle-stroke-color': 'rgba(255,255,255,0.65)',
    },
  });
}

// ─────────────────────────────────────────────────────────────────────────────
// Interactions
// ─────────────────────────────────────────────────────────────────────────────

function attachInteractions(key) {
  const clusterId = `${key}-clusters`;
  const pointsId  = `${key}-points`;
  const sourceId  = DATASETS[key].sourceId;

  // Click cluster → zoom in
  map.on('click', clusterId, e => {
    const f = map.queryRenderedFeatures(e.point, { layers: [clusterId] })[0];
    map.getSource(sourceId).getClusterExpansionZoom(
      f.properties.cluster_id,
      (err, zoom) => {
        if (err) return;
        map.easeTo({ center: f.geometry.coordinates, zoom: zoom + 0.5 });
      }
    );
  });

  // Click individual tree → popup
  map.on('click', pointsId, e => {
    const f = e.features[0];
    const p = f.properties;
    const coords = f.geometry.coordinates.slice();

    const condition = p.CONDITION
      ? `<div class="popup-cond">Condition: ${p.CONDITION}</div>`
      : '';

    new maplibregl.Popup({ offset: 8, maxWidth: '260px' })
      .setLngLat(coords)
      .setHTML(`
        <div class="popup-name">${p.COMMON_NAME || 'Unknown species'}</div>
        <div class="popup-sci">${p.SCIENTIFIC_NAME || ''}</div>
        ${condition}
      `)
      .addTo(map);
  });

  // Pointer cursor
  map.on('mouseenter', clusterId, () => { map.getCanvas().style.cursor = 'pointer'; });
  map.on('mouseleave', clusterId, () => { map.getCanvas().style.cursor = ''; });
  map.on('mouseenter', pointsId,  () => { map.getCanvas().style.cursor = 'pointer'; });
  map.on('mouseleave', pointsId,  () => { map.getCanvas().style.cursor = ''; });
}

// ─────────────────────────────────────────────────────────────────────────────
// Filter toggle
// ─────────────────────────────────────────────────────────────────────────────

let currentFilter = 'cherry';

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const f = btn.dataset.filter;
    if (f === currentFilter) return;
    currentFilter = f;

    document.querySelectorAll('.filter-btn').forEach(b =>
      b.classList.toggle('active', b === btn)
    );

    // Show/hide layer groups
    Object.keys(DATASETS).forEach(key => {
      const vis = key === f ? 'visible' : 'none';
      layerIds(key).forEach(id => {
        if (map.getLayer(id)) map.setLayoutProperty(id, 'visibility', vis);
      });
    });
  });
});

// ─────────────────────────────────────────────────────────────────────────────
// Bootstrap
// ─────────────────────────────────────────────────────────────────────────────

const statusEl = document.getElementById('status');

function setStatus(msg) {
  statusEl.textContent = msg;
  statusEl.classList.remove('hidden');
}

function hideStatus() {
  statusEl.classList.add('hidden');
}

map.on('load', async () => {
  setStatus('Fetching tree data from Seattle Open Data…');

  try {
    // Load cherry trees first so the map is usable sooner
    const cherryData = await fetchAllTrees(DATASETS.cherry.where);
    addDataset('cherry', cherryData);
    attachInteractions('cherry');

    const cherryCount = cherryData.features.length.toLocaleString();
    setStatus(`${cherryCount} flowering cherry trees loaded — fetching all Prunus…`);

    // Then load the full Prunus dataset in the background
    const allData = await fetchAllTrees(DATASETS.all.where);
    addDataset('all', allData);
    attachInteractions('all');

    const allCount = allData.features.length.toLocaleString();
    setStatus(`${cherryCount} flowering cherry trees · ${allCount} total Prunus trees`);

    setTimeout(hideStatus, 4000);

  } catch (err) {
    console.error('Failed to load tree data:', err);
    setStatus('Error loading data — check the console for details.');
  }
});
</script>
</body>
</html>
