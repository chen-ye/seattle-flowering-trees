<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Seattle Flowering Trees</title>
    <meta
      name="description"
      content="An interactive map exploring flowering trees in the Seattle Metro area."
    />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta
      property="og:url"
      content="https://chen-ye.github.io/seattle-flowering-trees/"
    />
    <meta property="og:title" content="Seattle Flowering Trees" />
    <meta
      property="og:description"
      content="An interactive map exploring flowering trees in the Seattle Metro area."
    />
    <meta
      property="og:image"
      content="https://chen-ye.github.io/seattle-flowering-trees/thumbnail.png"
    />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta
      property="twitter:url"
      content="https://chen-ye.github.io/seattle-flowering-trees/"
    />
    <meta property="twitter:title" content="Seattle Flowering Trees" />
    <meta
      property="twitter:description"
      content="An interactive map exploring flowering trees in the Seattle Metro area."
    />
    <meta
      property="twitter:image"
      content="https://chen-ye.github.io/seattle-flowering-trees/thumbnail.png"
    />
    <link
      href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.js"></script>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial,
          sans-serif;
        background: #f8f0f3;
        overflow: hidden;
      }

      #map {
        width: 100vw;
        height: 100vh;
        position: absolute;
        top: 0;
        left: 0;
        z-index: 1;
      }

      /* ── Popup overrides ─────────────────────────────────────────────── */
      .maplibregl-popup {
        z-index: 20;
      }

      .maplibregl-popup-content {
        border-radius: 10px;
        padding: 12px 16px;
        font-size: 13px;
        line-height: 1.6;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.15);
        min-width: 160px;
        max-width: 85vw !important;
      }

      .popup-name {
        font-weight: 700;
        color: #2d1a2e;
        margin-bottom: 1px;
      }
      .popup-sci {
        font-style: italic;
        color: #666;
        font-size: 12px;
      }
      .popup-cond {
        margin-top: 3px;
        font-size: 12px;
        color: #888;
      }
      .popup-source {
        margin-top: 5px;
        font-size: 11px;
        color: white;
        display: inline-block;
        padding: 1px 7px;
        border-radius: 8px;
      }

      .maplibregl-popup-close-button {
        font-size: 16px;
        color: #999;
        padding: 4px 8px;
      }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <app-ui></app-ui>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
