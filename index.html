<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seattle Flowering Trees</title>
  <link href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css" rel="stylesheet">
  <script src="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: #f8f0f3;
    }

    #map { width: 100vw; height: 100vh; }

    /* ── Controls panel ─────────────────────────────────────────────── */
    #panel {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      background: rgba(255,255,255,0.96);
      border-radius: 12px;
      padding: 12px 18px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.14);
      display: flex;
      align-items: center;
      gap: 12px;
      white-space: nowrap;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    #panel h1 { font-size: 15px; font-weight: 700; color: #2d1a2e; letter-spacing: -0.2px; }

    .divider { width: 1px; height: 20px; background: #ddd; }

    .filter-group { display: flex; gap: 6px; }

    .filter-btn {
      padding: 6px 14px;
      border: 1.5px solid #e8b4c8;
      border-radius: 20px;
      background: white;
      cursor: pointer;
      font-size: 13px;
      color: #7a3a55;
      font-weight: 500;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      line-height: 1;
    }

    .filter-btn:hover { background: #fff0f5; }

    .filter-btn.active { background: #e8436a; border-color: #e8436a; color: white; }

    /* ── Status bar ──────────────────────────────────────────────────── */
    #status {
      position: absolute;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      background: rgba(255,255,255,0.93);
      padding: 7px 18px;
      border-radius: 20px;
      font-size: 13px;
      color: #555;
      box-shadow: 0 1px 8px rgba(0,0,0,0.12);
      pointer-events: none;
      transition: opacity 0.8s ease;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      max-width: 80vw;
      text-align: center;
    }

    #status.hidden { opacity: 0; }

    /* ── Legend ──────────────────────────────────────────────────────── */
    #legend {
      position: absolute;
      bottom: 36px;
      right: 12px;
      z-index: 10;
      background: rgba(255,255,255,0.93);
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 12px;
      color: #555;
      box-shadow: 0 1px 8px rgba(0,0,0,0.12);
      line-height: 1.8;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    .legend-row { display: flex; align-items: center; gap: 8px; }

    .legend-dot {
      width: 10px; height: 10px;
      border-radius: 50%; flex-shrink: 0;
    }

    .legend-cluster {
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 8px; color: white; font-weight: bold; flex-shrink: 0;
    }

    /* ── Source badge ────────────────────────────────────────────────── */
    #sources {
      position: absolute;
      top: 62px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 90vw;
    }

    .source-badge {
      padding: 3px 9px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 500;
      color: white;
      opacity: 0.5;
      transition: opacity 0.3s;
      white-space: nowrap;
    }

    .source-badge.loaded { opacity: 1; }
    .source-badge.error  { opacity: 0.4; text-decoration: line-through; }

    /* ── Popup overrides ─────────────────────────────────────────────── */
    .maplibregl-popup-content {
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 13px;
      line-height: 1.6;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
      min-width: 160px;
    }

    .popup-name   { font-weight: 700; color: #2d1a2e; margin-bottom: 1px; }
    .popup-sci    { font-style: italic; color: #666; font-size: 12px; }
    .popup-cond   { margin-top: 3px; font-size: 12px; color: #888; }
    .popup-source {
      margin-top: 5px;
      font-size: 11px;
      color: white;
      display: inline-block;
      padding: 1px 7px;
      border-radius: 8px;
    }

    .maplibregl-popup-close-button { font-size: 16px; color: #999; padding: 4px 8px; }
  </style>
</head>
<body>

<div id="map"></div>

<div id="panel">
  <h1>🌸 Seattle Flowering Trees</h1>
  <div class="divider"></div>
  <div class="filter-group" role="group" aria-label="Tree filter">
    <button class="filter-btn active" data-filter="cherry">Flowering Cherry</button>
    <button class="filter-btn"        data-filter="all"   >All Prunus</button>
  </div>
  <div class="divider"></div>
  <button class="filter-btn active" id="cluster-toggle" title="Toggle clustering">Clusters</button>
</div>

<!-- Per-source loading badges -->
<div id="sources"></div>

<div id="status">Connecting to 5 data sources…</div>

<div id="legend">
  <div class="legend-row">
    <div class="legend-dot" style="background:#e8436a;border:1.5px solid white;box-shadow:0 0 0 1px #e8436a"></div>
    <span>Individual tree</span>
  </div>
  <div class="legend-row">
    <div class="legend-cluster" style="background:#d63579;width:16px;height:16px">50</div>
    <span>Cluster (50–200)</span>
  </div>
  <div class="legend-row">
    <div class="legend-cluster" style="background:#a0195a;width:22px;height:22px">200</div>
    <span>Cluster (200+)</span>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// Data source definitions
// Five datasets used by the original nathenry.com cherry blossom map.
// Fields with null values are discovered dynamically from layer metadata.
// ─────────────────────────────────────────────────────────────────────────────

const SOURCES = [
  {
    id:    'sdot',
    label: 'SDOT',
    color: '#e8436a',
    // ArcGIS Online endpoint — guaranteed CORS support from any browser origin.
    // The enterprise gisdata.seattle.gov mirror has uncertain CORS policy.
    base:  'https://services.arcgis.com/ZOyb2t4B0UYuYNYH/arcgis/rest/services/SDOT_Trees_CDL/FeatureServer/0',
    // Fields discovered dynamically via discoverFields(); aliases cover BOTANICAL_NAME / COMMON_NAME.
  },
  {
    id:    'uw',
    label: 'UW Campus',
    color: '#9b59b6',
    base:  'https://gis.maps.uw.edu/federated/rest/services/PublicData/PublicData/FeatureServer/37',
    sciField:    'SpeciesName',
    commonField: 'CommonName',
  },
  {
    id:    'spr',
    label: 'Seattle Parks',
    color: '#27ae60',
    base:  'https://services.arcgis.com/ZOyb2t4B0UYuYNYH/arcgis/rest/services/SPR_Tree_View_OD/FeatureServer/0',
  },
  {
    id:    'ufs',
    label: 'SPR Food Systems',
    color: '#e67e22',
    base:  'https://services.arcgis.com/ZOyb2t4B0UYuYNYH/arcgis/rest/services/SPR_Urban_Food_Systems_Fruit_Trees_OD/FeatureServer/0',
  },
  {
    id:    'arboretum',
    label: 'WP Arboretum',
    color: '#2980b9',
    base:  'https://uwbgmaps.sefs.uw.edu/arcgis/rest/services/Master/MapServer/1',
    sciField:    'BGBaseData.ScientificName',
    commonField: 'BGBaseData.CommonName',
    condField:   'BGBaseData.Condition',
  },
];

// ─────────────────────────────────────────────────────────────────────────────
// Dynamic field discovery
// Queries layer metadata (?f=json) to find scientific-name/common-name fields
// using ordered alias lists. Only runs for sources where fields are not preset.
// ─────────────────────────────────────────────────────────────────────────────

const SCI_ALIASES    = ['SCIENTIFIC_NAME','BOTANICAL_NAME','SCI_NAME','TAXON_NAME','TAXON','SCIENTIFIC','BOTANICAL','GENUS_SPECIES','SPEC_GENUS'];
const COMMON_ALIASES = ['COMMON_NAME','COMMON_NM','SPECIES_NAME','TREE_SPECIES','TREE_NAME','SPECTYPE','SPECIES','COMMON','TREE_TYPE'];
const COND_ALIASES   = ['CONDITION','CONDITION_','TREE_CONDITION','COND','RATING'];

function matchField(names, aliases) {
  const upper = names.map(n => n.toUpperCase());
  for (const alias of aliases) {
    const i = upper.indexOf(alias);
    if (i >= 0) return names[i];
  }
  // Fallback: partial prefix match
  for (const alias of aliases) {
    const n = upper.find(u => u.startsWith(alias));
    if (n) return names[upper.indexOf(n)];
  }
  return null;
}

async function discoverFields(source) {
  if ('sciField' in source) return; // already known (or explicitly null)

  let meta;
  try {
    const res = await fetch(`${source.base}?f=json`);
    meta = await res.json();
  } catch (e) {
    console.warn(`[${source.label}] discoverFields failed (network/CORS):`, e.message);
    source.sciField = null;
    source.commonField = null;
    source.condField = null;
    source.statusClause = null;
    return;
  }

  if (meta.error) {
    console.warn(`[${source.label}] discoverFields ArcGIS error:`, JSON.stringify(meta.error));
    source.sciField = null;
    source.commonField = null;
    source.condField = null;
    source.statusClause = null;
    return;
  }

  const fields = (meta.fields || []).map(f => f.name);
  source.sciField    = matchField(fields, SCI_ALIASES)    || null;
  source.commonField = matchField(fields, COMMON_ALIASES) || null;
  source.condField   = matchField(fields, COND_ALIASES)   || null;

  if (fields.some(n => n.toUpperCase() === 'CURRENT_STATUS')) {
    source.statusClause = "CURRENT_STATUS = 'INSVC'";
  } else {
    source.statusClause = null;
  }

  console.log(`[${source.label}] fields — sci: ${source.sciField}, common: ${source.commonField}, cond: ${source.condField}`);
}

// ─────────────────────────────────────────────────────────────────────────────
// Paginated ArcGIS fetch
// ─────────────────────────────────────────────────────────────────────────────

const PAGE_SIZE = 2000;

async function fetchSourceData(source) {
  await discoverFields(source);

  // Build WHERE clause from discovered/known fields
  const whereParts = [];
  if (source.sciField) {
    whereParts.push(`UPPER(${source.sciField}) LIKE 'PRUNUS%'`);
  } else {
    // No scientific name field — fetch all (small datasets like UFS) or skip
    whereParts.push('1=1');
  }
  if (source.statusClause) whereParts.push(source.statusClause);
  const where = whereParts.join(' AND ');

  // Determine which fields to request
  const outFields = [source.sciField, source.commonField, source.condField]
    .filter(Boolean).join(',') || '*';

  // Get total record count
  const countRes = await fetch(`${source.base}/query?` + new URLSearchParams({
    where, returnCountOnly: 'true', f: 'json',
  }));
  const countJson = await countRes.json();
  if (countJson.error) throw new Error(`ArcGIS error: ${JSON.stringify(countJson.error)}`);
  const count = countJson.count ?? 0;
  if (count === 0) return [];

  // Fetch all pages in parallel
  const offsets = Array.from({ length: Math.ceil(count / PAGE_SIZE) }, (_, i) => i * PAGE_SIZE);
  const pages = await Promise.all(offsets.map(offset =>
    fetch(`${source.base}/query?` + new URLSearchParams({
      where,
      outFields,
      outSR: '4326',
      f: 'geojson',
      resultOffset: offset,
      resultRecordCount: PAGE_SIZE,
      returnGeometry: 'true',
    })).then(r => r.json()).then(d => {
      if (d.error) throw new Error(`ArcGIS page error: ${JSON.stringify(d.error)}`);
      return d.features ?? [];
    })
  ));

  // Normalize to a common property schema
  return pages.flat().map(f => {
    const p     = f.properties || {};
    const sci   = ((source.sciField    && p[source.sciField])    || '').trim();
    const com   = ((source.commonField && p[source.commonField]) || '').trim();
    const cond  = ((source.condField   && p[source.condField])   || '').trim();

    return {
      ...f,
      properties: {
        _scientific: sci,
        _common:     com || sci || 'Unknown',
        _condition:  cond,
        _source:     source.label,
        _color:      source.color,
        _is_cherry:  isFloweringCherry(com, sci),
      },
    };
  });
}

// A tree is a "flowering cherry" if its common name includes "cherry"
// or its scientific name matches known ornamental cherry species.
function isFloweringCherry(common, scientific) {
  const cn  = common.toUpperCase();
  const sci = scientific.toUpperCase();

  if (cn.includes('CHERRY') && !cn.includes('LAUREL')) return true;

  // Catch ornamental species that may have non-obvious common names
  const CHERRY_PREFIXES = [
    'PRUNUS SERRULATA', 'PRUNUS YEDOENSIS', 'PRUNUS X YEDOENSIS',
    'PRUNUS SUBHIRTELLA', 'PRUNUS SARGENTII', 'PRUNUS INCISA',
    'PRUNUS PENDULA', 'PRUNUS SPECIOSA', 'PRUNUS CAMPANULATA',
    'PRUNUS NIPPONICA', 'PRUNUS JAMASAKURA',
  ];
  return CHERRY_PREFIXES.some(prefix => sci.startsWith(prefix));
}

// ─────────────────────────────────────────────────────────────────────────────
// MapLibre setup
// ─────────────────────────────────────────────────────────────────────────────

const COLORS = {
  single: '#e8436a',
  small:  '#f28cb1',   // cluster < 50
  medium: '#d63579',   // cluster 50–200
  large:  '#a0195a',   // cluster 200+
};

const map = new maplibregl.Map({
  container: 'map',
  style: 'https://basemaps.cartocdn.com/gl/positron-gl-style/style.json',
  center: [-122.335, 47.608],
  zoom: 11,
  minZoom: 9,
  maxZoom: 19,
});

map.addControl(new maplibregl.NavigationControl(), 'top-right');
map.addControl(new maplibregl.ScaleControl({ unit: 'imperial' }), 'bottom-left');

// ─────────────────────────────────────────────────────────────────────────────
// Layer management helpers
// addTreeLayer initialises source + layers on first call, then updates data.
// ─────────────────────────────────────────────────────────────────────────────

function geojson(features) {
  return { type: 'FeatureCollection', features };
}

function addOrUpdateSource(sourceId, features) {
  if (map.getSource(sourceId)) {
    map.getSource(sourceId).setData(geojson(features));
    return false; // existed
  }
  map.addSource(sourceId, {
    type: 'geojson',
    data: geojson(features),
    cluster: true,
    clusterMaxZoom: 14,
    clusterRadius: 45,
  });
  return true; // created
}

function addOrUpdateRawSource(sourceId, features) {
  if (map.getSource(sourceId)) {
    map.getSource(sourceId).setData(geojson(features));
    return false;
  }
  map.addSource(sourceId, {
    type: 'geojson',
    data: geojson(features),
    cluster: false,
  });
  return true;
}

function addLayersForSource(sourceId, visible) {
  const v = visible ? 'visible' : 'none';
  const prefix = sourceId.replace('-source', '');

  map.addLayer({
    id: `${prefix}-clusters`,
    type: 'circle',
    source: sourceId,
    filter: ['has', 'point_count'],
    layout: { visibility: v },
    paint: {
      'circle-color': [
        'step', ['get', 'point_count'],
        COLORS.small,  50,
        COLORS.medium, 200,
        COLORS.large,
      ],
      'circle-radius': [
        'step', ['get', 'point_count'],
        14,  50,
        20, 200,
        28,
      ],
      'circle-opacity': 0.88,
      'circle-stroke-width': 1.5,
      'circle-stroke-color': 'rgba(255,255,255,0.7)',
    },
  });

  map.addLayer({
    id: `${prefix}-cluster-count`,
    type: 'symbol',
    source: sourceId,
    filter: ['has', 'point_count'],
    layout: {
      visibility: v,
      'text-field': '{point_count_abbreviated}',
      'text-font': ['Open Sans Bold', 'Arial Unicode MS Bold'],
      'text-size': 11,
      'text-allow-overlap': true,
    },
    paint: { 'text-color': '#fff' },
  });

  map.addLayer({
    id: `${prefix}-points`,
    type: 'circle',
    source: sourceId,
    filter: ['!', ['has', 'point_count']],
    layout: { visibility: v },
    paint: {
      'circle-color': COLORS.single,
      'circle-radius': ['interpolate', ['linear'], ['zoom'], 12, 3.5, 16, 6, 19, 9],
      'circle-opacity': 0.85,
      'circle-stroke-width': 1,
      'circle-stroke-color': 'rgba(255,255,255,0.65)',
    },
  });

  // Cluster click → zoom in
  map.on('click', `${prefix}-clusters`, e => {
    const f = map.queryRenderedFeatures(e.point, { layers: [`${prefix}-clusters`] })[0];
    map.getSource(sourceId).getClusterExpansionZoom(f.properties.cluster_id, (err, zoom) => {
      if (!err) map.easeTo({ center: f.geometry.coordinates, zoom: zoom + 0.5 });
    });
  });

  // Point click → popup
  map.on('click', `${prefix}-points`, e => {
    const f = e.features[0];
    const p = f.properties;
    const coords = f.geometry.coordinates.slice();

    const nameHtml = p._common
      ? `<div class="popup-name">${p._common}</div>` : '';
    const sciHtml  = p._scientific && p._scientific !== p._common
      ? `<div class="popup-sci">${p._scientific}</div>` : '';
    const condHtml = p._condition
      ? `<div class="popup-cond">Condition: ${p._condition}</div>` : '';
    const srcHtml  =
      `<div class="popup-source" style="background:${p._color}">${p._source}</div>`;

    new maplibregl.Popup({ offset: 8, maxWidth: '260px' })
      .setLngLat(coords)
      .setHTML(nameHtml + sciHtml + condHtml + srcHtml)
      .addTo(map);
  });

  map.on('mouseenter', `${prefix}-clusters`, () => { map.getCanvas().style.cursor = 'pointer'; });
  map.on('mouseleave', `${prefix}-clusters`, () => { map.getCanvas().style.cursor = ''; });
  map.on('mouseenter', `${prefix}-points`,   () => { map.getCanvas().style.cursor = 'pointer'; });
  map.on('mouseleave', `${prefix}-points`,   () => { map.getCanvas().style.cursor = ''; });
}

function addRawLayersForSource(sourceId, visible) {
  const v      = visible ? 'visible' : 'none';
  const prefix  = sourceId.replace(/-source$/, '');
  const layerId = `${prefix}-points`;

  map.addLayer({
    id: layerId,
    type: 'circle',
    source: sourceId,
    layout: { visibility: v },
    paint: {
      'circle-color': ['coalesce', ['get', '_color'], COLORS.single],
      'circle-radius': ['interpolate', ['linear'], ['zoom'], 10, 2.5, 14, 4.5, 19, 8],
      'circle-opacity': 0.8,
      'circle-stroke-width': 0.8,
      'circle-stroke-color': 'rgba(255,255,255,0.6)',
    },
  });

  map.on('click', layerId, e => {
    const f = e.features[0];
    const p = f.properties;
    const coords = f.geometry.coordinates.slice();
    const nameHtml = p._common    ? `<div class="popup-name">${p._common}</div>` : '';
    const sciHtml  = p._scientific && p._scientific !== p._common
      ? `<div class="popup-sci">${p._scientific}</div>` : '';
    const condHtml = p._condition ? `<div class="popup-cond">Condition: ${p._condition}</div>` : '';
    const srcHtml  = `<div class="popup-source" style="background:${p._color}">${p._source}</div>`;
    new maplibregl.Popup({ offset: 8, maxWidth: '260px' })
      .setLngLat(coords)
      .setHTML(nameHtml + sciHtml + condHtml + srcHtml)
      .addTo(map);
  });
  map.on('mouseenter', layerId, () => { map.getCanvas().style.cursor = 'pointer'; });
  map.on('mouseleave', layerId, () => { map.getCanvas().style.cursor = ''; });
}

// ─────────────────────────────────────────────────────────────────────────────
// Accumulated feature state
// ─────────────────────────────────────────────────────────────────────────────

let allFeatures = [];

function refreshMapData() {
  const cherryFeatures = allFeatures.filter(f => f.properties._is_cherry);

  const cherryCreated = addOrUpdateSource('cherry-source', cherryFeatures);
  if (cherryCreated) addLayersForSource('cherry-source', clustered && currentFilter === 'cherry');

  const cherryRawCreated = addOrUpdateRawSource('cherry-raw-source', cherryFeatures);
  if (cherryRawCreated) addRawLayersForSource('cherry-raw-source', !clustered && currentFilter === 'cherry');

  // "all" sources only added/shown once fully populated (see bootstrap)
}

// ─────────────────────────────────────────────────────────────────────────────
// Filter toggle
// ─────────────────────────────────────────────────────────────────────────────

let currentFilter = 'cherry';
let clustered     = true;

const LAYER_GROUPS = {
  cherry:         ['cherry-clusters', 'cherry-cluster-count', 'cherry-points'],
  all:            ['all-clusters',    'all-cluster-count',    'all-points'],
  'cherry-raw':   ['cherry-raw-points'],
  'all-raw':      ['all-raw-points'],
};

function applyVisibility() {
  const active = clustered ? currentFilter : `${currentFilter}-raw`;
  Object.entries(LAYER_GROUPS).forEach(([key, layers]) => {
    const vis = key === active ? 'visible' : 'none';
    layers.forEach(id => { if (map.getLayer(id)) map.setLayoutProperty(id, 'visibility', vis); });
  });
}

document.querySelectorAll('.filter-btn[data-filter]').forEach(btn => {
  btn.addEventListener('click', () => {
    const f = btn.dataset.filter;
    if (f === currentFilter) return;
    currentFilter = f;
    document.querySelectorAll('.filter-btn[data-filter]').forEach(b =>
      b.classList.toggle('active', b === btn)
    );
    applyVisibility();
  });
});

document.getElementById('cluster-toggle').addEventListener('click', function () {
  clustered = !clustered;
  this.classList.toggle('active', clustered);
  applyVisibility();
});

// ─────────────────────────────────────────────────────────────────────────────
// Source loading badges
// ─────────────────────────────────────────────────────────────────────────────

const sourcesEl = document.getElementById('sources');
const badges    = {};

SOURCES.forEach(src => {
  const el = document.createElement('div');
  el.className = 'source-badge';
  el.style.background = src.color;
  el.textContent = src.label;
  sourcesEl.appendChild(el);
  badges[src.id] = el;
});

// ─────────────────────────────────────────────────────────────────────────────
// Bootstrap
// ─────────────────────────────────────────────────────────────────────────────

const statusEl = document.getElementById('status');

map.on('load', async () => {
  let loadedCount  = 0;
  let failedCount  = 0;

  // Fire all five source fetches in parallel
  const promises = SOURCES.map(src =>
    fetchSourceData(src)
      .then(features => {
        loadedCount++;
        badges[src.id].classList.add('loaded');

        allFeatures.push(...features);
        refreshMapData();

        const cherry = allFeatures.filter(f => f.properties._is_cherry).length;
        statusEl.textContent =
          `${loadedCount + failedCount}/5 sources · ` +
          `${cherry.toLocaleString()} cherry trees · ` +
          `${allFeatures.length.toLocaleString()} Prunus`;
      })
      .catch(err => {
        failedCount++;
        badges[src.id].classList.add('error');
        console.warn(`[${src.label}] failed to load:`, err);
      })
  );

  await Promise.all(promises);

  // Finalise the "all Prunus" sources (added after all data is loaded
  // so clusters reflect the complete dataset)
  const allCreated = addOrUpdateSource('all-source', allFeatures);
  if (allCreated) addLayersForSource('all-source', clustered && currentFilter === 'all');

  const allRawCreated = addOrUpdateRawSource('all-raw-source', allFeatures);
  if (allRawCreated) addRawLayersForSource('all-raw-source', !clustered && currentFilter === 'all');

  const cherryTotal = allFeatures.filter(f => f.properties._is_cherry).length;
  const grandTotal  = allFeatures.length;
  const srcNote     = failedCount > 0 ? ` (${failedCount} source${failedCount > 1 ? 's' : ''} unavailable)` : '';

  statusEl.textContent =
    `${cherryTotal.toLocaleString()} flowering cherry trees · ` +
    `${grandTotal.toLocaleString()} total Prunus trees${srcNote}`;

  setTimeout(() => { statusEl.classList.add('hidden'); }, 5000);
});
</script>
</body>
</html>
